document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

color:#4d605b;font-weight:600;font-size:.9rem\">Audio al acabar la jornada, foto del albarán o del ticket, mensaje de texto. Por el WhatsApp que ya usan cada día.<\u002Fp>\n        <span style=\"margin-top:.8rem;display:inline-block;padding:.28rem .7rem;border-radius:999px;background:rgba(33,183,136,.12);border:1px solid rgba(33,183,136,.3);color:#0b8b66;font-size:.68rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase\">Cero fricción para el operario<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:1.5rem 1.4rem;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;background:linear-gradient(120deg,#1fae82,#1f9bb0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">2<\u002Fdiv>\n        <h3 style=\"font-size:1.05rem;font-weight:800;margin:.6rem 0 .35rem\">Nosotros lo procesamos<\u002Fh3>\n        <p style=\"color:#4d605b;font-weight:600;font-size:.9rem\">Convertimos cada mensaje en su documento: parte de trabajo, albarán, presupuesto, orden de trabajo. Con los datos de tu negocio y el formato de tu sector.<\u002Fp>\n        <span style=\"margin-top:.8rem;display:inline-block;padding:.28rem .7rem;border-radius:999px;background:rgba(33,183,136,.12);border:1px solid rgba(33,183,136,.3);color:#0b8b66;font-size:.68rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase\">Hay una persona detrás<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:1.5rem 1.4rem;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;background:linear-gradient(120deg,#1fae82,#1f9bb0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">3<\u002Fdiv>\n        <h3 style=\"font-size:1.05rem;font-weight:800;margin:.6rem 0 .35rem\">Tú recibes el documento hecho<\u002Fh3>\n        <p style=\"color:#4d605b;font-weight:600;font-size:.9rem\">Estructurado, con validez, listo para firmar o enviar al cliente. Y tu contabilidad y tu Drive, al día sin tocarlos.<\u002Fp>\n        <span style=\"margin-top:.8rem;display:inline-block;padding:.28rem .7rem;border-radius:999px;background:rgba(33,183,136,.12);border:1px solid rgba(33,183,136,.3);color:#0b8b66;font-size:.68rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase\">Operativo en 2 semanas<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 5 · SECTORES ═══ -->\n<section data-screen-label=\"Sectores\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"display:flex;align-items:center;gap:.55rem;color:#0b8b66;font-size:.74rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#1fae82,#1f9bb0)\"><\u002Fspan>Sectores<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.5rem,2.9vw,2.35rem);font-weight:900;letter-spacing:-.03em;line-height:1.08;max-width:none\">Hablamos <span style=\"color:#1fae82\">tu idioma<\u002Fspan>, no el de las apps.<\u002Fh2>\n    <p style=\"margin-top:.8rem;color:#4d605b;font-weight:700;max-width:56ch\">Cada sector tiene sus documentos, su normativa y su jaleo. Elige el tuyo.<\u002Fp>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:.5rem;margin-top:2rem\">\n      <sc-for list=\"{{ sectores }}\" as=\"s\" hint-placeholder-count=\"7\">\n        <button type=\"button\" onclick=\"{{ s.onClick }}\" style=\"{{ s.tabStyle }}\">{{ s.tab }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:1.2rem;padding:1.7rem;background:#fff;border:1px solid #e3ece8;border-radius:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.6rem;align-items:start\">\n      <div>\n        <h3 style=\"font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;letter-spacing:-.02em\">{{ sectorActual.nombre }}<\u002Fh3>\n        <div style=\"margin-top:.15rem;color:#6b7f7a;font-weight:800;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase\">{{ sectorActual.rol }}<\u002Fdiv>\n        <div style=\"margin-top:.9rem;padding:.9rem 1rem;border-radius:12px;background:rgba(255,111,97,.07);border-left:4px solid #ff6f61;color:#7c453e;font-weight:700;font-size:.92rem;font-style:italic\">{{ sectorActual.dolor }}<\u002Fdiv>\n        <div style=\"margin-top:.7rem;color:#4d605b;font-weight:700;font-size:.92rem\">{{ sectorActual.fix }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"font-size:.68rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#0b8b66;margin-bottom:.6rem\">Documentos que te resolvemos<\u002Fh4>\n        <div style=\"display:flex;flex-wrap:wrap;gap:.5rem\">\n          <sc-for list=\"{{ sectorActual.docs }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <span style=\"display:inline-flex;align-items:center;gap:.35rem;padding:.42rem .75rem;border-radius:999px;background:rgba(33,183,136,.1);border:1px solid rgba(33,183,136,.3);color:#0b8b66;font-size:.82rem;font-weight:800\">✓ {{ d }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 6 · SERVICIOS ═══ -->\n<section data-screen-label=\"Servicios\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"display:flex;align-items:center;gap:.55rem;color:#0b8b66;font-size:.74rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#1fae82,#1f9bb0)\"><\u002Fspan>Qué te resolvemos<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.5rem,2.9vw,2.35rem);font-weight:900;letter-spacing:-.03em;line-height:1.08\">Cubrimos tu día a día. <span style=\"color:#1fae82\">Y los entresijos de tu sector.<\u002Fspan><\u002Fh2>\n    <p style=\"margin-top:.8rem;color:#4d605b;font-weight:700;max-width:none\">El papeleo del día a día es el mismo en todos los oficios. Lo específico de tu sector, se añade encima.<\u002Fp>\n\n    <div style=\"padding:1.8rem;border:1px solid rgba(33,183,136,.4);border-radius:16px;background:#fff;margin-top:2.2rem\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem\">\n        <h3 style=\"font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900\">El núcleo — para todos los oficios<\u002Fh3>\n        <span style=\"padding:.32rem .8rem;border-radius:999px;background:linear-gradient(120deg,rgba(33,183,136,.18),rgba(166,230,53,.18));border:1px solid rgba(33,183,136,.4);color:#0b8b66;font-size:.68rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase\">Incluido siempre<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.9rem\">\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Partes de trabajo<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">Audio o foto → parte diario estructurado + resumen semanal<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Presupuestos<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">Descríbelo o sube el esbozo → desglosado en menos de 1 h<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Albaranes e informes<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">Foto → documento conciliado con sus facturas<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Órdenes de trabajo<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">Asignación, seguimiento y cierre por WhatsApp<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Documentación del equipo<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">Contratos, seguros, carnets, PRL — con alertas de caducidad<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:.95rem 1rem;border-radius:12px;background:#f4f8f6;border:1px solid #dde8e3\"><b style=\"display:block;font-size:.92rem;margin-bottom:.2rem\">Certificaciones y facturación<\u002Fb><span style=\"font-size:.8rem;color:#6b7f7a;font-weight:600\">De las mediciones al documento de cobro, en horas<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:1.8rem 0 .8rem;font-size:.72rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#4d605b;display:flex;align-items:center;gap:.7rem\">Módulos por sector<span style=\"flex:1;height:1px;background:#e3ece8\"><\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.7rem\">\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Construcción<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">CAE y subcontratas<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Construcción<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Generación de PSS<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Electricidad<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Boletines eléctricos<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Mecánica<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Historial ITV y diagnóstico<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Mudanzas<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Inventario firmado<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Limpieza<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Registro de presencia<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Jardinería<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Justificante de visitas<\u002Fb><\u002Fdiv>\n        <div style=\"padding:.85rem .95rem;border-radius:12px;background:rgba(31,155,176,.06);border:1px solid rgba(31,155,176,.25)\"><span style=\"font-size:.6rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#067383\">Fontanería / clima<\u002Fspan><b style=\"display:block;font-size:.86rem;margin-top:.15rem;color:#13211f\">Presupuesto de avería<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 7 · RESULTADOS ═══ -->\n<section data-screen-label=\"Resultados\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"display:flex;align-items:center;gap:.55rem;color:#0b8b66;font-size:.74rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#1fae82,#1f9bb0)\"><\u002Fspan>Resultados<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.8vw,2.9rem);font-weight:900;letter-spacing:-.03em;line-height:1.08;max-width:24ch\">Antes y después, en <span style=\"color:#1fae82\">números<\u002Fspan>.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-top:2.2rem\">\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">−90 %<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Partes de trabajo<\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">45 min/día<\u002Fs> → <b style=\"color:#13211f\">5 min/día<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">−85 %<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Gestión documental del equipo<\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">12 h/semana<\u002Fs> → <b style=\"color:#13211f\">menos de 2 h<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">−75 %<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Certificaciones y facturación<\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">6 h<\u002Fs> → <b style=\"color:#13211f\">1,5 h<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">−80 %<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Gestión de albaranes<\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">45 min/día<\u002Fs> → <b style=\"color:#13211f\">10 min/día<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">−90 %<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Generación de PSS <span style=\"font-size:.7rem;color:#6b7f7a\">(construcción)<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">8 h<\u002Fs> → <b style=\"color:#13211f\">45 min<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:1.4rem;text-align:left;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <div style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:#0b8b66;letter-spacing:.02em\">&lt; 1 h<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:.95rem;margin-top:.3rem\">Presupuestos completos<\u002Fdiv>\n        <div style=\"margin-top:.5rem;font-size:.8rem;font-weight:700;color:#6b7f7a\"><s style=\"color:#ff6f61\">6–8 h<\u002Fs> → <b style=\"color:#13211f\">menos de 1 h<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 8 · PRECIOS ═══ -->\n<section data-screen-label=\"Precios\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"display:flex;align-items:center;gap:.55rem;color:#0b8b66;font-size:.74rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#1fae82,#1f9bb0)\"><\u002Fspan>Precios<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.5rem,2.9vw,2.35rem);font-weight:900;letter-spacing:-.03em;line-height:1.08\">Se paga con media jornada <span style=\"color:#1fae82\">recuperada<\u002Fspan> al mes.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-top:2.2rem;align-items:stretch\">\n      <div style=\"padding:1.7rem 1.5rem;display:flex;flex-direction:column;background:#fff;border:1px solid #e3ece8;border-radius:16px\">\n        <h3 style=\"font-size:1.05rem;font-weight:900\">Autónomo<\u002Fh3>\n        <div style=\"font-size:.8rem;color:#6b7f7a;font-weight:700;margin-top:.1rem\">Vas solo o con equipo pequeño<\u002Fdiv>\n        <div style=\"margin:1rem 0 .2rem;display:flex;align-items:baseline;gap:.3rem\"><b style=\"font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;letter-spacing:.02em\">89 €<\u002Fb><span style=\"color:#6b7f7a;font-weight:800;font-size:.85rem\">/mes<\u002Fspan><\u002Fdiv>\n        <ul style=\"list-style:none;margin-top:.9rem;flex:1;padding:0\">\n          <li style=\"padding:.4rem 0 .4rem 1.3rem;position:relative;font-size:.88rem;font-weight:600;color:#4d605b;border-bottom:1px solid #e2eae7\"><span style=\"position:absolute;left:0;color:#1fae82;font-weight:900\">✓<\u002Fspan>Hasta 3 operarios<\u002Fli>\n          <li style=\"padding:.4rem 0 .4rem 1.3rem;position:relative;font-size:.88rem;font-weight:600;color:#4d605b;border-bottom:1px solid #e2eae7\"><span style=\"position:absolute;left:0;color:#1fae82;font-weight:900\">✓<\u002Fspan>Núcleo completo<\u002Fli>\n          <li style=\"padding:.4rem 0 .4rem 1.3rem;position:relative;font-size:.88rem;font-weight:600;color:#4d605b;border-bottom:1px solid #e2eae7\"><span style=\"position:absolute;left:0;color:#1fae82;font-weight:900\">✓<\u002Fspan>1 módulo de tu sector<\u002Fli>\n          <li style=\"padding:.4rem 0 .4rem 1.3rem;position:relative;font-size:.88rem;font-weight:600;color:#4d605b\"><span style=\"position:absolute;left:0;color:#1fae82;font-weight:900\">✓<\u002Fspan>Soporte por WhatsApp< Fli>\n          <li style=\"padding:.4rem 0 .4rem 1.3rem;position:relative;font-size:.88rem;font-weight:600;color:#4d605b\"><span style=\"position:absolute;left:0;color:#1fae82;font-weight:900\">✓<\u002Fspan>Informes de costes por trabajo<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:1.4rem;text-align:center;color:#4d605b;font-weight:800;font-size:.82rem\">Sin permanencia · Sin coste de implantación · Operativo en 2 semanas<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 9 · GARANTÍA ═══ -->\n<section data-screen-label=\"Garantía\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"margin-top:0;padding:2.6rem 2.2rem;text-align:center;border:1px solid rgba(33,183,136,.4);border-radius:16px;background:#fff\">\n      <div style=\"display:inline-flex;align-items:center;gap:.5rem;padding:.45rem 1.1rem;border-radius:999px;background:rgba(33,183,136,.12);border:1px solid rgba(33,183,136,.4);color:#0b8b66;font-size:.72rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.1rem\">Sin compromiso previo<\u002Fdiv>\n      <h3 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3.4vw,2.5rem);font-weight:900;letter-spacing:-.03em;line-height:1.12;max-width:26ch;margin:0 auto\">Primero lo ves <span style=\"color:#1fae82\">funcionar<\u002Fspan>. Luego decides. Sin compromiso previo.<\u002Fh3>\n      <p style=\"margin:1rem auto 0;color:#4d605b;font-weight:700;max-width:52ch\">Sabemos que has probado cosas que prometían mucho y no funcionaron en el día a día. Por eso aquí el orden es otro: lo montamos, lo ves con tus propios documentos y decides después. Sin letra pequeña.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 10 · FAQ ═══ -->\n<section data-screen-label=\"FAQ\" style=\"position:relative;z-index:2;padding:5.5rem 0\">\n  <div style=\"position:relative;z-index:2;width:min(1120px,100%);margin:0 auto;padding:0 1.5rem\">\n    <div style=\"display:flex;align-items:center;gap:.55rem;color:#0b8b66;font-size:.74rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.9rem\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#1fae82,#1f9bb0)\"><\u002Fspan>Preguntas frecuentes<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(1.5rem,2.9vw,2.35rem);font-weight:900;letter-spacing:-.03em;line-height:1.08\">Lo que todos preguntan <span style=\"color:#1fae82\">antes<\u002Fspan> de empezar.<\u002Fh2>\n    <div style=\"margin-top:2.2rem;display:grid;gap:.7rem\">\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">¿Mi equipo tiene que instalar o aprender algo?<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">No. Nada. Mandan foto, audio o texto por el WhatsApp que ya usan. El operario nuevo hace lo mismo que el veterano desde el primer día — no hay nada que enseñarle.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">Ya me apaño con Excel y plantillas. ¿Para qué cambiar?<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">¿Cuántas horas le dedicas a la semana? Si son menos de 2, sinceramente no te podemos ayudar. Si son más — y suelen ser 8 a 15 — hay margen de sobra. Y lo que sale de Enginyia es documentación estructurada y con validez, no una plantilla más.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">He probado otras herramientas y mi equipo no las usó.<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">Es el motivo nº 1 por el que fallan. Por eso aquí tu equipo no usa ninguna herramienta: sigue mandando WhatsApps como siempre y nosotros procesamos desde nuestro lado. Y antes de comprometerte a nada, lo ves funcionar con tu propio equipo.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">¿Qué pasa con las subcontratas?<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">Igual que tu equipo: no se registran en nada ni instalan nada. Mandan por WhatsApp y su documentación queda recogida. En construcción, además, el módulo de CAE y subcontratas te mantiene la documentación de coordinación al día.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">¿Cuánto tarda en estar funcionando?<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">Dos semanas. Tú nos cuentas cómo trabajas, nosotros montamos el sistema con tus documentos y tu formato. La configuración la hacemos nosotros — no es un proyecto de implantación, es una conversación.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-radius:12px;background:#fff;border:1px solid #e3ece8;overflow:hidden\">\n        <summary style=\"cursor:pointer;list-style:none;padding:1rem 1.2rem;font-weight:800;font-size:.96rem;display:flex;justify-content:space-between;align-items:center;gap:1rem\">¿Hay permanencia o coste de alta?<\u002Fsummary>\n        <div style=\"padding:0 1.2rem 1.1rem;color:#4d605b;font-weight:600;font-size:.9rem\">No y no. Facturación mensual, te vas cuando quieras. Y antes de pagar nada, lo ves funcionar con tus propios documentos — sin compromiso previo.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══ 11 · CIERRE ═══ -->\n<section data-screen-label=\"Cierre\" style=\"position:relative;z-index:2;min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 1.5rem\">\n  <h2 style=\"font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:900;letter-spacing:-.03em;line-height:1.05;max-width:18ch\">Recupera tus <span style=\"color:#1fae82\">domingos<\u002Fspan>. Y tus tardes. Y tus noches.<\u002Fh2>\n  <p style=\"margin-top:1rem;color:#4d605b;font-weight:700;max-width:48ch\">Da igual si vas solo o tienes equipo: el papeleo se hace solo mientras tú trabajas. Cuéntanos cómo trabajas — 15 minutos, sin compromiso.<\u002Fp>\n  <a href=\"https://wa.me/34614877564?text=Hola%2C%20quiero%20ver%20c%C3%B3mo%20funciona%20Enginyia%20con%20mi%20equipo\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:2.2rem;display:inline-flex;align-items:center;gap:.6rem;padding:1rem 1.9rem;border-radius:999px;background:linear-gradient(120deg,#1fae82,#1f9bb0);color:#08302a;text-decoration:none;font-weight:900;font-size:1rem;box-shadow:0 16px 42px rgba(33,183,136,.35)\">\n    <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width:20px;height:20px\"><path d=\"M12 2a10 10 0 00-8.6 15.1L2 22l5-1.3A10 10 0 1012 2zm5 13.9c-.2.6-1.2 1.1-1.7 1.1-.4.1-1 .1-1.6-.1-.4-.1-.9-.3-1.5-.6-2.6-1.1-4.3-3.8-4.4-4-.1-.2-1.1-1.4-1.1-2.7s.7-1.9.9-2.2c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.4.2.5.7 1.8.8 1.9.1.1.1.3 0 .4-.1.2-.1.3-.3.5l-.4.5c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.6-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.6-.1.3.1 1.6.8 1.9.9.3.2.5.2.5.4.1.1.1.7-.1 1.3z\"><\u002Fpath><\u002Fsvg>\n    Cuéntame cómo trabajas\n  <\u002Fa>\n  <div style=\"margin-top:.9rem;font-size:.74rem;font-weight:800;color:#4d605b\">Sin permanencia · Sin coste de implantación · Sin compromiso previo<\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"position:relative;z-index:2;text-align:center;padding:1.6rem;color:#5c756c;font-size:.76rem;border-top:1px solid #e3ece8\">\n  enginiagencia@gmail.com · 614 87 75 64 · <b style=\"color:#0b8b66\">Enginyia<\u002Fb> — El papeleo resuelto. Sin apps. Sin cambiar nada.\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.paperEls = [];\n    this.phaseEls = [];\n    this.dotEls = [];\n    this.TARGET = 247;\n    this.SECTORES = [\n      { id:'construccion', tab:'🏗 Construcción', nombre:'Construcción', rol:'Jefe de obra · encargado · autónomo constructor',\n        dolor:'«Me paso los domingos haciendo partes y no llego igual.»',\n        fix:'Los partes se generan solos desde los WhatsApps del equipo. El CAE y las subcontratas dejan de comerte horas: nadie se registra en nada. Y las certificaciones salen a tiempo — que es como se cobra a tiempo.',\n        docs:['Parte de obra','PSS','CAE y subcontratas','Albarán','Certificación'] },\n      { id:'fontaneria', tab:'🔧 Fontanería / Clima', nombre:'Fontanería y climatización', rol:'Autónomo · encargado de instaladora',\n        dolor:'«Hago 4 trabajos al día. Facturo sin detalle y el cliente discute.»',\n        fix:'Cada servicio deja su parte y su albarán de intervención en el momento, con firma del cliente. Se acabaron las facturas sin soporte y las discusiones por presupuestos que no quedaron por escrito.',\n        docs:['Parte de servicio','Albarán de intervención','Presupuesto de avería'] },\n      { id:'electricidad', tab:'⚡ Electricidad', nombre:'Electricidad', rol:'Instalador · jefe de equipo',\n        dolor:'«Tengo tres equipos en tres obras y no sé qué han hecho hasta la noche.»',\n        fix:'Cada equipo reporta por WhatsApp y tú ves el día completo sin llamar a nadie. Los boletines dejan de retrasar cobros y cada orden de trabajo queda con su trazabilidad.',\n        docs:['Parte de servicio','Boletín eléctrico','Orden de trabajo','Albarán'] },\n      { id:'mecanica', tab:'🔩 Mecánica', nombre:'Mecánica de coches', rol:'Jefe de taller · autónomo mecánico',\n        dolor:'«El cliente dice que no le dije el precio y tengo que ceder.»',\n        fix:'Cada coche entra con su orden de trabajo y su aprobación escrita antes de tocar nada. Historial por vehículo, recambios controlados por trabajo y facturas que nadie puede discutir.',\n        docs:['Orden de trabajo','Hoja de intervención','Diagnóstico','Historial ITV'] },\n      { id:'mudanzas', tab:'🚛 Mudanzas / Transporte', nombre:'Mudanzas y transporte', rol:'Encargado de operaciones · autónomo porteador',\n        dolor:'«Cuando hay una reclamación, no tengo nada que presentar.»',\n        fix:'El equipo hace fotos antes y después — nosotros generamos el inventario firmado. Cada entrega deja su albarán en el momento y la facturación no espera a que el parte llegue días después.',\n        docs:['Inventario firmado','Parte de carga/descarga','Albarán de entrega','Ruta'] },\n      { id:'limpieza', tab:'🧹 Limpieza industrial', nombre:'Limpieza industrial', rol:'Encargado · autónomo',\n        dolor:'«Hacer los partes del mes de 8 centros me lleva dos días enteros.»',\n        fix:'Registro de presencia y partes de servicio automáticos por centro. Tu cliente corporativo recibe los partes firmados que exige para aprobar la factura — sin que tú pases dos días montándolos.',\n        docs:['Parte de servicio','Registro de presencia','Albarán mensual'] },\n      { id:'jardineria', tab:'🌿 Jardinería / Paisajismo', nombre:'Jardinería y paisajismo', rol:'Encargado · paisajista autónomo',\n        dolor:'«La comunidad pregunta qué hicimos el martes y no tengo nada escrito.»',\n        fix:'Cada visita deja su parte de trabajo automático — la comunidad tiene su justificante y tú puedes defender horas y materiales. Los presupuestos dejan de hacerse a ojo.',\n        docs:['Parte de trabajo','Justificante de visitas','Albarán de materiales','Presupuesto'] }\n    ];\n    this.state = { sectorIndex: 0 };\n  }\n\n  clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }\n  ease(t){ return t<0?0:t>1?1:t*t*(3-2*t); }\n\n  fadeTitle(el, p, inStart, inEnd, outStart, outEnd){\n    if(!el) return;\n    let o=0, y=24;\n    if(p < inStart){ o=0; y=24; }\n    else if(p < inEnd){ const k=this.ease((p-inStart)/(inEnd-inStart)); o=k; y=24*(1-k); }\n    else if(outStart === null){ o=1; y=0; }\n    else if(p < outStart){ o=1; y=0; }\n    else if(p < outEnd){ const k=this.ease((p-outStart)/(outEnd-outStart)); o=1-k; y=-18*k; }\n    else { o=0; y=-18; }\n    el.style.opacity = o;\n    el.style.transform = `translateY(${y}px)`;\n  }\n\n  updateChaos(){\n    const track = this.chaosTrackEl;\n    if(!track) return;\n    const rect = track.getBoundingClientRect();\n    const total = rect.height - window.innerHeight;\n    const p = this.clamp(-rect.top / total, 0, 1);\n\n    if(this.counterNumEl) this.counterNumEl.textContent = Math.round(this.ease(this.clamp(p/0.82,0,1)) * this.TARGET);\n    if(this.counterSubEl) this.counterSubEl.textContent = p < 0.8 ? 'y subiendo…' : 'esta semana. Solo esta semana.';\n\n    this.paperEls.forEach(el=>{\n      if(!el) return;\n      const start = parseFloat(el.dataset.start);\n      const speed = parseFloat(el.dataset.speed);\n      const rot = parseFloat(el.dataset.rot);\n      const x = el.dataset.x, y = el.dataset.y;\n      el.style.left = x + '%';\n      el.style.top = y + '%';\n      const local = this.clamp((p - start)/0.12, 0, 1);\n      let op = this.ease(local);\n      let drift = (p - start) * speed * -340;\n      if(this.reduced){ drift = 0; op = p >= start ? (p > 0.9 ? 0 : 1) : 0; }\n      else if(p > 0.86){\n        const k = this.ease((p - 0.86)/0.14);\n        op *= (1 - k);\n      }\n      el.style.opacity = op;\n      el.style.transform = `translateY(${drift}px) rotate(${rot}deg) scale(${0.92 + 0.08*local})`;\n    });\n\n    this.fadeTitle(this.t1El, p, 0.06, 0.16, 0.30, 0.38);\n    this.fadeTitle(this.t2El, p, 0.40, 0.50, 0.62, 0.70);\n    this.fadeTitle(this.t3El, p, 0.74, 0.84, null, null);\n  }\n\n  updateTx(){\n    const track = this.txTrackEl;\n    if(!track) return;\n    const rect = track.getBoundingClientRect();\n    const total = rect.height - window.innerHeight;\n    const p = this.clamp(-rect.top / total, 0, 1);\n\n    if(this.txCounterEl) this.txCounterEl.style.opacity = p > 0.01 ? 1 : 0;\n    if(this.txCounterEl) this.txCounterEl.style.transform = p > 0.01 ? 'translateY(0)' : 'translateY(-14px)';\n\n    const N = this.phaseEls.length || 4;\n    const seg = 1 / N;\n    this.phaseEls.forEach((ph,i)=>{\n      if(!ph) return;\n      const s = i * seg;\n      const local = this.clamp((p - s)/seg, 0, 1);\n      let o=0, y=30, sc=.98;\n      if(local <= 0){ o=0; }\n      else if(local < 0.22){ const k=this.ease(local/0.22); o=k; y=30*(1-k); sc=.98+.02*k; }\n      else if(local < 0.82 || i === N-1){ o=1; y=0; sc=1; }\n      else { const k=this.ease((local-0.82)/0.18); o=1-k; y=-24*k; sc=1; }\n      if(this.reduced){ o = (p>=s && (p<s+seg || i===N-1)) ? 1 : 0; y=0; sc=1; }\n      ph.style.opacity = o;\n      ph.style.transform = `translateY(${y}px) scale(${sc})`;\n\n      const fill = this.clamp((p - s)/seg, 0, 1);\n      if(this.dotEls[i]){\n        this.dotEls[i].style.background = fill > 0\n          ? `linear-gradient(90deg, #1fae82 ${fill*100}%, rgba(20,40,35,.12) ${fill*100}%)`\n          : 'rgba(20,40,35,.12)';\n      }\n    });\n  }\n\n  onScroll(){\n    if(this.ticking) return;\n    this.ticking = true;\n    requestAnimationFrame(()=>{\n      this.updateChaos();\n      this.updateTx();\n      this.ticking = false;\n    });\n  }\n\n  componentDidMount(){\n    this.reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.chaosTrackEl = this._chaosTrackEl;\n    this.txTrackEl = this._txTrackEl;\n    this.counterNumEl = this._counterNumEl;\n    this.counterSubEl = this._counterSubEl;\n    this.t1El = this._t1El;\n    this.t2El = this._t2El;\n    this.t3El = this._t3El;\n    this.txCounterEl = this._txCounterEl;\n    this._onScroll = this.onScroll.bind(this);\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    window.addEventListener('resize', this._onScroll);\n    this._onScroll();\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n  }\n\n  selectSector(i){\n    this.setState({ sectorIndex: i });\n  }\n\n  renderVals(){\n    const activeStyle = \"padding:.55rem 1.05rem;border-radius:999px;background:linear-gradient(120deg,rgba(33,183,136,.18),rgba(31,155,176,.16));border:1px solid rgba(33,183,136,.55);color:#0b8b66;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:800;cursor:pointer\";\n    const idleStyle = \"padding:.55rem 1.05rem;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid rgba(16,33,30,.14);color:#4d605b;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:800;cursor:pointer\";\n\n    const sectores = this.SECTORES.map((s,i)=>({\n      tab: s.tab,\n      tabStyle: i===this.state.sectorIndex ? activeStyle : idleStyle,\n      onClick: ()=>this.selectSector(i)\n    }));\n\n    const sectorActual = this.SECTORES[this.state.sectorIndex];\n\n    return {\n      refRoot: (el)=>{},\n      refChaosTrack: (el)=>{ if(el) this._chaosTrackEl = el; },\n      refPaper: (el)=>{ if(el && this.paperEls.indexOf(el)===-1) this.paperEls.push(el); },\n      refCounterNum: (el)=>{ if(el) this._counterNumEl = el; },\n      refCounterSub: (el)=>{ if(el) this._counterSubEl = el; },\n      refT1: (el)=>{ if(el) this._t1El = el; },\n      refT2: (el)=>{ if(el) this._t2El = el; },\n      refT3: (el)=>{ if(el) this._t3El = el; },\n      refTxTrack: (el)=>{ if(el) this._txTrackEl = el; },\n      refTxCounter: (el)=>{ if(el) this._txCounterEl = el; },\n      refPhase: (el)=>{ if(el && this.phaseEls.indexOf(el)===-1) this.phaseEls.push(el); },\n      refDot: (el)=>{ if(el && this.dotEls.indexOf(el)===-1) this.dotEls.push(el); },\n      sectores,\n      sectorActual\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
